<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Cloud Projects</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body { margin:0; min-height:100vh; background:#030509; color:#F4F6FB; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background-image: radial-gradient(circle at top right, rgba(99,102,241,0.18), transparent 45%), radial-gradient(circle at bottom left, rgba(56,189,248,0.10), transparent 42%);
  padding:32px 16px; overflow-x:hidden; }
.orb { position:fixed; border-radius:50%; filter:blur(70px); opacity:.3; pointer-events:none; z-index:0; animation:floatOrb 14s ease-in-out infinite; }
.orb1 { width:300px;height:300px; background:#6366F1; top:-80px; right:-80px; }
.orb2 { width:260px;height:260px; background:#38BDF8; bottom:-60px; left:-60px; animation-delay:4s; }
@keyframes floatOrb { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(24px,-28px) scale(1.08);} }
@keyframes fadeInUp { from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }
.wrap { position:relative; z-index:1; max-width:820px; margin:0 auto; }
h1 { font-size:24px; font-weight:900; margin-bottom:4px; text-align:center;
  background:linear-gradient(90deg,#818CF8,#38BDF8); -webkit-background-clip:text; background-clip:text; color:transparent; }
p.sub { text-align:center; color:#8B93A7; font-size:12px; margin-bottom:28px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
.card { background:rgba(17,20,34,0.62); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.06); border-radius:18px; padding:18px; text-decoration:none; color:inherit; display:block;
  animation:fadeInUp .5s ease both; transition:transform .15s ease, border-color .15s ease; }
.card:hover { border-color:rgba(99,102,241,0.4); transform:translateY(-3px); }
.dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
.on { background:#10B981; box-shadow:0 0 0 0 rgba(16,185,129,.6); animation:pulseDot 2s infinite; } .off { background:#475569; }
@keyframes pulseDot { 0%{box-shadow:0 0 0 0 rgba(16,185,129,.6);} 70%{box-shadow:0 0 0 6px rgba(16,185,129,0);} 100%{box-shadow:0 0 0 0 rgba(16,185,129,0);} }
.name { font-weight:800; font-size:14px; margin-top:8px; }
.desc { font-size:11px; color:#8B93A7; margin-top:4px; line-height:1.5; }
.empty { text-align:center; color:#4B5568; font-size:12px; margin-top:40px; }
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div class="wrap">
  <h1><i class="fa-solid fa-cloud"></i> Z-Cloud Projects</h1>
  <p class="sub">Live projects hosted on a personal Z-Cloud Panel instance</p>
  <div class="grid">
    <a class="card" href="projects/6d58ecd013e7/">
      <span class="dot off"></span><span style="font-size:10px;color:#8B93A7;">Offline</span>
      <div class="name">Zxi</div>
      <div class="desc"></div>
    </a>
  </div>
  
</div>
</body>
</html>
