<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zxi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body { margin:0; min-height:100vh; background:#030509; color:#F4F6FB; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background-image: radial-gradient(circle at top right, rgba(99,102,241,0.18), transparent 45%), radial-gradient(circle at bottom left, rgba(56,189,248,0.10), transparent 42%);
  display:flex; align-items:center; justify-content:center; padding:20px; overflow-x:hidden; }
.orb { position:fixed; border-radius:50%; filter:blur(60px); opacity:.35; pointer-events:none; z-index:0; animation:floatOrb 12s ease-in-out infinite; }
.orb1 { width:280px;height:280px; background:#6366F1; top:-60px; right:-60px; }
.orb2 { width:240px;height:240px; background:#38BDF8; bottom:-40px; left:-40px; animation-delay:3s; }
@keyframes floatOrb { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(20px,-25px) scale(1.08);} }
@keyframes fadeInUp { from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }
.card { position:relative; z-index:1; max-width:480px; width:100%; background:rgba(17,20,34,0.65); backdrop-filter:blur(24px) saturate(160%); border:1px solid rgba(255,255,255,0.07);
  border-radius:24px; padding:32px 26px; box-shadow:0 8px 32px rgba(0,0,0,0.4); text-align:center; animation:fadeInUp .6s ease both; }
.badge { display:inline-flex; align-items:center; gap:6px; font-size:11px; padding:5px 12px; border-radius:999px; margin-bottom:14px; font-weight:600; }
.on { background:rgba(16,185,129,0.12); color:#34D399; border:1px solid rgba(16,185,129,0.25); }
.off { background:rgba(148,163,184,0.1); color:#94A3B8; border:1px solid rgba(148,163,184,0.2); }
.dotlive { width:7px; height:7px; border-radius:50%; background:#34D399; display:inline-block; box-shadow:0 0 0 0 rgba(52,211,153,.6); animation:pulseDot 2s infinite; }
@keyframes pulseDot { 0%{box-shadow:0 0 0 0 rgba(52,211,153,.6);} 70%{box-shadow:0 0 0 7px rgba(52,211,153,0);} 100%{box-shadow:0 0 0 0 rgba(52,211,153,0);} }
h1 { font-size:22px; font-weight:800; margin:6px 0 2px; }
h2 { font-size:13px; font-weight:500; color:#9CA3C4; margin:0 0 16px; }
p.desc { font-size:13px; color:#B7BDD3; line-height:1.6; margin-bottom:10px; }
p.welcome { font-size:13px; color:#818CF8; line-height:1.6; margin-bottom:20px; font-style:italic; }
.btns { display:flex; flex-direction:column; gap:10px; margin-top:10px; }
.btn { display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; border-radius:14px; font-size:13px; font-weight:700; text-decoration:none; color:#fff; transition:transform .15s ease; }
.btn:active { transform:scale(.97); }
.btn-live { background:linear-gradient(135deg,#6366F1,#38BDF8); }
.btn-tg { background:#229ED9; }
.btn-yt { background:#FF0000; }
.btn-c0 { background:linear-gradient(135deg,#F59E0B,#F97316); }
.btn-c1 { background:linear-gradient(135deg,#10B981,#059669); }
.btn-c2 { background:linear-gradient(135deg,#EC4899,#DB2777); }
.btn-c3 { background:linear-gradient(135deg,#8B5CF6,#7C3AED); }
.foot { margin-top:22px; font-size:10px; color:#4B5568; }
#gate { position:fixed; inset:0; background:#030509; display:flex; align-items:center; justify-content:center; z-index:50; }
#gate input { background:#0F1420; border:1px solid #262c3f; border-radius:12px; padding:10px 14px; color:#fff; font-size:13px; margin-right:8px; }
#gate button { background:#6366F1; border:none; border-radius:12px; padding:10px 16px; color:#fff; font-weight:700; font-size:13px; }
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>

<div class="card">
  <span class="badge off">🔴 Offline</span>
  <h1>Zxi</h1>
  <h2></h2>
  
  
  <div class="btns">
    <span class="btn" style="background:#1e293b;color:#64748b;cursor:default;"><i class="fa-solid fa-power-off"></i> Currently Offline</span>
    
    
    
  </div>
  <img src="https://api.visitorbadge.io/api/visitors?path=6d58ecd013e7&label=Visitors&countColor=%236366F1&style=flat" alt="visitors" style="margin-top:18px;border-radius:8px;">
  <p class="foot">Powered by Z-Cloud Panel</p>
</div>
</body>
</html>
